version: 2

models:
  - name: slv_yellow_taxi
    description: Cleaned and typed yellow taxi trips. Filters out invalid records (zero fare, distance, or passengers).
    columns:
      - name: trip_id
        description: Unique identifier for each trip.
        tests:
          - unique
          - not_null

      - name: vendor_id
        description: ID of the taxi vendor (1 or 2).
        tests:
          - not_null
          - accepted_values:
              values: [1, 2]

      - name: pickup_datetime
        description: Timestamp when the trip started.
        tests:
          - not_null

      - name: dropoff_datetime
        description: Timestamp when the trip ended.
        tests:
          - not_null

      - name: passenger_count
        description: Number of passengers.
        tests:
          - not_null

      - name: trip_distance
        description: Distance of the trip in miles.
        tests:
          - dbt_utils.expression_is_true:
              expression: "<= 100"
              column_name: trip_distance

      - name: fare_amount
        description: Base fare charged for the trip.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 1 and fare_amount <= 500"
              column_name: fare_amount

      - name: total_amount
        description: Total amount charged including tips and fees.
        tests:
          - dbt_utils.expression_is_true:
              expression: "<= 5000"
              column_name: total_amount
              config:
                severity: warn
